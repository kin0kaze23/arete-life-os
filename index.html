<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Areté | Excellence Manifested</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Standardizing to Token Values */
        --bg-void: #02040a;
        --bg-deep: #0d1117;
        --border-subtle: rgba(255, 255, 255, 0.08);

        /* The 5 Dimensions */
        --dim-health: #10b981;
        --dim-finance: #3b82f6;
        --dim-relationships: #a855f7;
        --dim-spiritual: #f59e0b;
        --dim-personal: #f43f5e;

        --radius-panel: 16px;
        --radius-item: 12px;
        --radius-pill: 24px;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-void);
        color: #ffffff;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-subtle);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        border-radius: var(--radius-panel);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Premium Scrollbar */
      .premium-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .premium-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb {
        background: var(--border-subtle);
        border-radius: 10px;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      /* Clerk widget — force dark footer & card styles */
      .cl-card,
      .cl-cardBox {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5) !important;
        border-radius: 16px !important;
      }

      .cl-footer,
      .cl-internal-bvn3e6,
      [data-localization-key='footerPagesLink__privacy'],
      [data-localization-key='footerPagesLink__terms'] {
        background: transparent !important;
        background-color: transparent !important;
      }

      /* Clerk footer bottom (the white Secured by Clerk strip) */
      .cl-footer .cl-footerAction,
      .cl-footer > *,
      .cl-internal-1hp5nqm {
        background: transparent !important;
      }

      /* Overall Clerk modal background reset */
      .cl-signIn-root,
      .cl-signUp-root {
        background: transparent !important;
      }
      /* Clerk "Development mode" warning — suppress in dev, gone in prod */
      .cl-internal-1k7jtru {
        background: rgba(255, 255, 255, 0.03) !important;
        background-image: none !important;
        border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
      }
      .cl-internal-1k7jtru [data-localization-key='badge__devMode'],
      .cl-internal-1k7jtru a {
        opacity: 0.4 !important;
      }
    </style>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
