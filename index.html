<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Areté | Excellence Manifested</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Standardizing to Token Values */
        --bg-void: #02040a;
        --bg-deep: #08090c;
        --bg-elevated: #0d1117;
        --border-subtle: rgba(255, 255, 255, 0.08);
        --accent-indigo: #6366f1;
        --accent-emerald: #10b981;
        --accent-rose: #f43f5e;
        --accent-amber: #f59e0b;

        --radius-panel: 3rem;
        --radius-item: 1.5rem;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-void);
        color: #e6edf3;
        margin: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .glass-panel {
        background: rgba(13, 17, 23, 0.7);
        backdrop-filter: blur(40px);
        border: 1px solid var(--border-subtle);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
      }

      .mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes flow {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .animate-flow {
        background:
          radial-gradient(circle at top left, #0f172a 0%, #02040a 50%),
          radial-gradient(circle at bottom right, #1e1b4b 0%, #02040a 50%);
        background-size: 200% 200%;
        animation: flow 20s ease infinite;
      }

      .text-glow-indigo {
        text-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
      }

      @keyframes neural-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          opacity: 0.85;
          transform: scale(0.99);
          filter: brightness(1.1);
        }
      }
      .neural-pulse {
        animation: neural-pulse 6s infinite ease-in-out;
      }

      @keyframes scanline {
        0% {
          transform: translateY(-100%);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(100vh);
          opacity: 0;
        }
      }
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(99, 102, 241, 0.2), transparent);
        z-index: 100;
        pointer-events: none;
        animation: scanline 12s linear infinite;
      }

      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.02;
        z-index: 99;
        pointer-events: none;
      }

      /* Premium Scrollbar for overflow areas */
      .premium-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .premium-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb {
        background: var(--border-subtle);
        border-radius: 10px;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--accent-indigo);
      }
    </style>
  </head>
  <body class="dark animate-flow">
    <div class="scanline"></div>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
