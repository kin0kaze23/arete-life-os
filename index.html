<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Areté | Excellence Manifested</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-app: #070b14;
        --bg-elevated: #0f1625;
        --bg-card: #121b2d;
        --border-subtle: rgba(148, 163, 184, 0.22);
        --text-primary: #e7edf8;
        --text-secondary: #99a6bf;
        --accent-primary: #5b8cff;
        --accent-success: #26b47f;
      }

      body {
        font-family: 'Manrope', sans-serif;
        background:
          radial-gradient(circle at 12% 4%, rgba(91, 140, 255, 0.16), transparent 38%),
          radial-gradient(circle at 90% 0%, rgba(37, 99, 235, 0.08), transparent 34%),
          var(--bg-app);
        color: var(--text-primary);
        margin: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .glass-panel {
        background: rgba(18, 27, 45, 0.72);
        backdrop-filter: blur(24px);
        border: 1px solid var(--border-subtle);
        box-shadow: 0 18px 44px -28px rgba(15, 23, 42, 0.85);
      }

      .mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .premium-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .premium-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.4);
        border-radius: 10px;
      }
      .premium-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--accent-primary);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "react-markdown": "https://esm.sh/react-markdown@^9.0.1"
        }
      }
    </script>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
